services:
  - type: web
    name: kao-rush-evaluation
    env: docker
    autoDeploy: true
    healthCheckPath: /health
    disks:
      - name: kao_data
        mountPath: /data
        sizeGB: 10
    envVars:
      - key: DATA_ROOT
        value: /data
      - key: SESSION_COOKIE_SECURE
        value: "1"
      - key: SESSION_COOKIE_SAMESITE
        value: strict
      - key: REQUIRE_PERSISTENT_DATA
        value: "1"
      - key: ALLOWED_HOSTS
        value: "*"
      - key: DB_PATH
        value: /data/recruitment.db
      - key: PLATFORM_DB_PATH
        value: /data/platform.db
      - key: TENANTS_DB_DIR
        value: /data/tenants
      - key: UPLOADS_DIR
        value: /data/uploads
      - key: BACKUP_DIR
        value: /data/uploads/backups
      - key: DEFAULT_TENANT_SLUG
        value: kappaalphaorder
      - key: DEFAULT_TENANT_NAME
        value: Kappa Alpha Order
      - key: PLATFORM_ADMIN_USERNAME
        value: taylortaut
      - key: PLATFORM_ADMIN_ACCESS_CODE
        sync: false
      - key: HEAD_SEED_USERNAME
        value: chapteradmin
      - key: HEAD_SEED_ACCESS_CODE
        sync: false
      - key: HEAD_SEED_FIRST_NAME
        value: Head
      - key: HEAD_SEED_LAST_NAME
        value: Officer
