<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="{{ app_config.theme_primary }}" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="{{ app_config.chapter_name }}" />
    <title>{{ app_config.tenant_name }} Meeting</title>
    <link rel="manifest" href="{{ app_config.base_path }}/manifest.webmanifest" />
    <link rel="apple-touch-icon" href="/static/icons/icon-192.png" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Karla:wght@400;500;700&family=Space+Grotesk:wght@500;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="/static/css/styles.css" />
    <script src="/static/js/pwa_shell.js" defer></script>
    <script src="/static/js/meeting.js" defer></script>
  </head>
  <body data-app-config='{{ app_config | tojson | forceescape }}' data-mobile-page="meeting">
    <div id="pwaSplash" class="pwa-splash hidden" aria-hidden="true">
      <div class="pwa-splash-card">
        <p class="eyebrow">{{ app_config.chapter_name }}</p>
        <h2>BidBoard</h2>
        <p>Loading meeting packet view...</p>
      </div>
    </div>
    <main class="shell mobile-shell">
      <header class="hero mobile-hero">
        <p class="eyebrow">{{ app_config.chapter_name }}</p>
        <h1>Meeting Packet</h1>
        <p>Open one PNM at a time and export the packet as PDF for chapter review.</p>
      </header>

      <section class="panel mobile-panel">
        <div class="inline-grid">
          <label>
            Rushee
            <select id="meetingPnmSelect"></select>
          </label>
          <label class="btn-wrap">
            <span>&nbsp;</span>
            <button id="meetingLoadBtn" type="button">Load Packet</button>
          </label>
        </div>
        <div class="action-row meeting-actions">
          <button id="meetingPdfBtn" type="button" class="secondary">Download PDF</button>
          <button id="meetingRefreshBtn" type="button" class="secondary">Refresh</button>
        </div>
      </section>

      <section id="meetingPacket" class="panel meeting-view mobile-panel">
        <p class="muted">Select a rushee and click Load Packet.</p>
      </section>
    </main>

    <nav class="mobile-tabs" aria-label="Mobile Navigation">
      <a href="{{ app_config.mobile_routes.dashboard if app_config.mobile_routes else app_config.mobile_base }}" class="mobile-tab">Dashboard</a>
      <a href="{{ app_config.mobile_routes.rushees if app_config.mobile_routes else app_config.mobile_base ~ '/pnms' }}" class="mobile-tab is-active">Rushees</a>
      <a href="{{ app_config.mobile_routes.team if app_config.mobile_routes else app_config.mobile_base ~ '/members' }}" class="mobile-tab">Team</a>
      <a href="{{ app_config.mobile_routes.calendar if app_config.mobile_routes else app_config.mobile_base ~ '/calendar' }}" class="mobile-tab">Calendar</a>
      <a href="{{ app_config.mobile_routes.admin if app_config.mobile_routes else app_config.mobile_base ~ '/admin' }}" class="mobile-tab">Admin</a>
    </nav>

    <div id="meetingToast" class="toast hidden"></div>
  </body>
</html>
