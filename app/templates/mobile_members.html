<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="{{ app_config.theme_primary }}" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="{{ app_config.chapter_name }}" />
    <title>{{ app_config.tenant_name }} Members</title>
    <link rel="manifest" href="{{ app_config.base_path }}/manifest.webmanifest" />
    <link rel="apple-touch-icon" href="/static/icons/icon-192.png" />
    <link rel="stylesheet" href="/static/css/styles.css" />
    <script src="/static/js/pwa_shell.js" defer></script>
    <script src="/static/js/mobile.js" defer></script>
  </head>
  <body data-app-config='{{ app_config | tojson | forceescape }}' data-mobile-page="members">
    <div id="pwaSplash" class="pwa-splash hidden" aria-hidden="true">
      <div class="pwa-splash-card">
        <p class="eyebrow">{{ app_config.chapter_name }}</p>
        <h2>BidBoard</h2>
        <p>Loading member participation...</p>
      </div>
    </div>
    <main class="shell mobile-shell">
      <header class="hero mobile-hero">
        <p class="eyebrow">{{ app_config.chapter_name }}</p>
        <h1>Team</h1>
        <p>Review participation, assignments, and same-state matches from your phone.</p>
      </header>

      <section class="panel mobile-panel">
        <div class="inline-grid two-cols">
          <label>
            Role
            <select id="mobileMemberRoleFilter">
              <option value="all">All Roles</option>
              <option value="Head Rush Officer">Head Rush Officer</option>
              <option value="Rush Officer">Rush Officer</option>
              <option value="Rusher">Rusher</option>
            </select>
          </label>
          <label>
            State
            <input id="mobileMemberStateFilter" list="mobileMemberStateHints" type="text" placeholder="All states" />
          </label>
        </div>
        <div class="inline-grid two-cols">
          <label>
            City
            <input id="mobileMemberCityFilter" type="text" placeholder="Any city" />
          </label>
          <label>
            Sort
            <select id="mobileMemberSortFilter">
              <option value="location">Location</option>
              <option value="username">Username</option>
              <option value="role">Role</option>
            </select>
          </label>
        </div>
        <div class="action-row">
          <button id="mobileApplyMemberFiltersBtn" type="button">Apply Filters</button>
          <button id="mobileRefreshMembersBtn" type="button" class="secondary">Refresh</button>
        </div>
      </section>

      <section class="panel mobile-panel">
        <div id="mobileMemberList" class="mobile-list"></div>
      </section>

      <section class="panel mobile-panel">
        <h2 id="mobileSameStateHeader">Same-State Rushees</h2>
        <p id="mobileSameStateHint" class="muted">Select a member card to load same-state rushees.</p>
        <div id="mobileSameStateList" class="mobile-list"></div>
      </section>
    </main>

    <datalist id="mobileMemberStateHints"></datalist>

    <nav class="mobile-tabs" aria-label="Mobile Navigation">
      <a href="{{ app_config.mobile_routes.dashboard if app_config.mobile_routes else app_config.mobile_base }}" class="mobile-tab">Command</a>
      <a href="{{ app_config.mobile_routes.rushees if app_config.mobile_routes else app_config.mobile_base ~ '/pnms' }}" class="mobile-tab">Rushees</a>
      <a href="{{ app_config.mobile_routes.team if app_config.mobile_routes else app_config.mobile_base ~ '/members' }}" class="mobile-tab is-active">Team</a>
      <a href="{{ app_config.mobile_routes.calendar if app_config.mobile_routes else app_config.mobile_base ~ '/calendar' }}" class="mobile-tab">Operations</a>
      <a href="{{ app_config.mobile_routes.admin if app_config.mobile_routes else app_config.mobile_base ~ '/admin' }}" class="mobile-tab">Admin</a>
    </nav>

    <div id="mobileToast" class="toast hidden"></div>
  </body>
</html>
