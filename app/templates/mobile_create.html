<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="{{ app_config.theme_primary }}" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="{{ app_config.chapter_name }}" />
    <title>{{ app_config.tenant_name }} Add Rushee</title>
    <link rel="manifest" href="{{ app_config.base_path }}/manifest.webmanifest" />
    <link rel="apple-touch-icon" href="/static/icons/icon-192.png" />
    <link rel="stylesheet" href="/static/css/styles.css" />
    <script src="/static/js/pwa_shell.js" defer></script>
    <script src="/static/js/mobile.js" defer></script>
  </head>
  <body data-app-config='{{ app_config | tojson | forceescape }}' data-mobile-page="create">
    <div id="pwaSplash" class="pwa-splash hidden" aria-hidden="true">
      <div class="pwa-splash-card">
        <p class="eyebrow">{{ app_config.chapter_name }}</p>
        <h2>BidBoard</h2>
        <p>Preparing create workflow...</p>
      </div>
    </div>
    <main class="shell mobile-shell">
      <div class="mobile-appbar">
        <a href="{{ app_config.mobile_routes.dashboard if app_config.mobile_routes else app_config.mobile_base }}" class="mobile-appbar-brand">
          <img src="{{ app_config.logo_path if app_config.logo_path else '/static/icons/bidboard-shield.svg' }}" alt="{{ app_config.tenant_name }} mark" class="mobile-appbar-mark" />
          <div>
            <p>{{ app_config.chapter_name }}</p>
            <strong>BidBoard</strong>
          </div>
        </a>
        <div class="mobile-appbar-actions">
          <a href="{{ app_config.mobile_routes.rushees if app_config.mobile_routes else app_config.mobile_base ~ '/pnms' }}" class="mobile-appbar-link">Roster</a>
        </div>
      </div>
      <header class="hero mobile-hero mobile-hero-compact">
        <p class="eyebrow">{{ app_config.chapter_name }}</p>
        <h1>Add Rushee</h1>
        <p>Fast create flow for events. Keep it short and finish the rest later from the roster.</p>
      </header>

      <section class="panel mobile-panel">
        <form id="mobileCreatePnmForm" class="stack">
          <div class="inline-grid">
            <label>First name<input id="mobilePnmFirstName" type="text" required /></label>
            <label>Last name<input id="mobilePnmLastName" type="text" required /></label>
          </div>
          <div class="inline-grid">
            <label>
              Class year
              <select id="mobilePnmClassYear" required>
                <option>F</option>
                <option>S</option>
                <option>J</option>
              </select>
            </label>
            <label>First event date<input id="mobilePnmEventDate" type="date" required /></label>
          </div>
          <div class="inline-grid two-cols">
            <label>Hometown<input id="mobilePnmHometown" type="text" required /></label>
            <label>State (optional)<input id="mobilePnmState" list="mobileStateHints" type="text" maxlength="64" placeholder="TX or Texas" /></label>
          </div>
          <label>Phone number<input id="mobilePnmPhone" type="text" placeholder="+1 555 123 4567" /></label>
          <label>Instagram handle<input id="mobilePnmInstagram" type="text" required placeholder="@username" /></label>
          <label>
            Interests
            <div id="mobileInterestTags" class="tag-picker" aria-label="Default interest tags"></div>
            <input id="mobilePnmInterests" type="hidden" value="" />
            <p class="muted">Choose approved interest tags only.</p>
          </label>
          <label>
            Stereotype
            <div id="mobileStereotypeTags" class="tag-picker" aria-label="Default stereotype tags"></div>
            <input id="mobilePnmStereotype" type="hidden" value="" />
            <p class="muted">Choose one approved stereotype tag.</p>
          </label>
          <label>Touchpoint stats (optional)<input id="mobilePnmLunchStats" type="text" /></label>
          <label>Notes (optional)<textarea id="mobilePnmNotes" rows="3" placeholder="Talking points, strengths, concerns"></textarea></label>
          <label>Photo (optional)<input id="mobilePnmPhoto" type="file" accept="image/png,image/jpeg,image/webp" /></label>
          <button type="submit">Create Rushee</button>
        </form>
      </section>
    </main>

    <datalist id="mobileStateHints"></datalist>

    <nav class="mobile-tabs" aria-label="Mobile Navigation">
      <a href="{{ app_config.mobile_routes.dashboard if app_config.mobile_routes else app_config.mobile_base }}" class="mobile-tab">Command</a>
      <a href="{{ app_config.mobile_routes.rushees if app_config.mobile_routes else app_config.mobile_base ~ '/pnms' }}" class="mobile-tab is-active">Rushees</a>
      <a href="{{ app_config.mobile_routes.team if app_config.mobile_routes else app_config.mobile_base ~ '/members' }}" class="mobile-tab">Team</a>
      <a href="{{ app_config.mobile_routes.calendar if app_config.mobile_routes else app_config.mobile_base ~ '/calendar' }}" class="mobile-tab">Operations</a>
      <a href="{{ app_config.mobile_routes.admin if app_config.mobile_routes else app_config.mobile_base ~ '/admin' }}" class="mobile-tab">Admin</a>
    </nav>

    <div id="mobileToast" class="toast hidden"></div>
  </body>
</html>
