<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="{{ app_config.theme_primary }}" />
    <title>{{ app_config.tenant_name }} PNMs</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Karla:wght@400;500;700&family=Space+Grotesk:wght@500;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="/static/css/styles.css" />
    <script src="/static/js/mobile.js" defer></script>
  </head>
  <body data-app-config='{{ app_config | tojson | forceescape }}' data-mobile-page="pnms">
    <main class="shell mobile-shell">
      <header class="hero mobile-hero">
        <p class="eyebrow">{{ app_config.chapter_name }}</p>
        <h1>PNM Directory</h1>
        <p>Tap a rushee to jump directly into meeting packet review.</p>
      </header>

      <section class="panel mobile-panel">
        <div class="action-row">
          <button id="mobileRefreshPnmsBtn" type="button" class="secondary">Refresh</button>
          <button id="mobileDownloadContactsBtn" type="button" class="secondary">Download iPhone Contacts</button>
        </div>
      </section>

      <section class="panel mobile-panel">
        <div id="mobilePnmList" class="mobile-list"></div>
      </section>
    </main>

    <nav class="mobile-tabs" aria-label="Mobile Navigation">
      <a href="{{ app_config.mobile_base }}" class="mobile-tab">Home</a>
      <a href="{{ app_config.mobile_base }}/pnms" class="mobile-tab is-active">PNMs</a>
      <a href="{{ app_config.mobile_base }}/create" class="mobile-tab">Create</a>
      <a href="{{ app_config.mobile_base }}/members" class="mobile-tab">Members</a>
      <a href="{{ app_config.mobile_base }}/meeting" class="mobile-tab">Meeting</a>
    </nav>

    <div id="mobileToast" class="toast hidden"></div>
  </body>
</html>
